    <main class="auth-main">
        <div class="auth-container">
            <h2>Sign In</h2>
            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label>Login*</label>
                    <div class="input-wrapper">
                        <input type="text" id="loginInput" required placeholder="Enter login">
                    </div>
                    <span class="error-msg" id="loginError"></span>
                </div>
                <div class="form-group">
                    <label>Password*</label>
                    <div class="input-wrapper">
                        <input type="password" id="passwordInput" required placeholder="Enter password">
                    </div>
                    <span class="error-msg" id="passwordError"></span>
                </div>
                <button type="submit" id="loginSubmitBtn" class="btn-primary" disabled>Sign In</button>
                <div class="server-error" id="loginServerError"></div>
                <p class="auth-switch">Don't have an account? <a href="../register/index.html">Register</a></p>
            </form>
        </div>
    </main>
