<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Zoo - Map</title>
    <meta name="description" content="Explore our interactive map to find your favorite animals at Online Zoo.">
    <link rel="icon" href="../../assets/icons/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../landing/index.html" class="logo-link">
                    <img src="../../assets/icons/logo.svg" alt="Online Zoo" class="logo" width="96" height="50">
                </a>
                <nav class="nav-menu">
                    <a href="../landing/index.html" class="nav-link">About</a>
                    <a href="#" class="nav-link active">Map</a>
                    <a href="../zoos/index.html" class="nav-link">Zoos</a>
                    <a href="../contact/index.html" class="nav-link">Contact us</a>
                </nav>
                <div class="social-links">
                    <a href="#" class="social-link" aria-label="YouTube">
                        <img src="../../assets/icons/youtube.svg" alt="YouTube" width="40" height="40">
                    </a>
                    <a href="#" class="social-link" aria-label="Instagram">
                        <img src="../../assets/icons/instagram.svg" alt="Instagram" width="40" height="40">
                    </a>
                    <a href="#" class="social-link" aria-label="Facebook">
                        <img src="../../assets/icons/facebook.svg" alt="Facebook" width="40" height="40">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- Map Section -->
        <section class="map-section">
            <div class="container">
                <h1 class="map-title">Online Zoo</h1>
                <h2 class="map-subtitle">Watch animals from around the world</h2>
                <div class="map-wrapper">
                    <img src="../../assets/images/placeholder.svg" alt="World Map" class="map-image">

                    <!-- Animal icons positioned on the map -->
                    <a href="../zoos/index.html" class="map-pin" style="top: 35%; left: 25%;" title="Giant Panda Lucas">
                        <div class="map-pin-icon">🐼</div>
                        <span class="map-pin-label">Lucas</span>
                    </a>
                    <a href="../zoos/index.html" class="map-pin" style="top: 55%; left: 60%;"
                        title="Madagascarian Lemur Andy">
                        <div class="map-pin-icon">🐒</div>
                        <span class="map-pin-label">Andy</span>
                    </a>
                    <a href="../zoos/index.html" class="map-pin" style="top: 50%; left: 45%;" title="Gorilla Glen">
                        <div class="map-pin-icon">🦍</div>
                        <span class="map-pin-label">Glen</span>
                    </a>
                    <a href="../zoos/index.html" class="map-pin" style="top: 30%; left: 15%;"
                        title="Bald Eagles Sam & Lora">
                        <div class="map-pin-icon">🦅</div>
                        <span class="map-pin-label">Sam & Lora</span>
                    </a>
                    <a href="../zoos/index.html" class="map-pin" style="top: 65%; left: 80%;"
                        title="Australian Koala Liz">
                        <div class="map-pin-icon">🐨</div>
                        <span class="map-pin-label">Liz</span>
                    </a>
                    <a href="../zoos/index.html" class="map-pin" style="top: 48%; left: 50%;"
                        title="African Lion Shake">
                        <div class="map-pin-icon">🦁</div>
                        <span class="map-pin-label">Shake</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-top">
                    <div class="footer-logos">
                        <img src="../../assets/icons/logo-white.svg" alt="Online Zoo" class="footer-logo" width="96"
                            height="50">
                        <div class="footer-partner-logos">
                            <img src="../../assets/icons/yem-digital.svg" alt="Yem Digital" class="partner-logo"
                                width="50" height="50">
                            <img src="../../assets/icons/rsschool.svg" alt="RS School" class="rs-logo" width="138"
                                height="51">
                        </div>
                    </div>
                    <nav class="footer-nav">
                        <a href="../landing/index.html" class="footer-nav-link">About</a>
                        <a href="#" class="footer-nav-link">Map</a>
                        <a href="../zoos/index.html" class="footer-nav-link">Zoos</a>
                        <a href="../contact/index.html" class="footer-nav-link">Contact us</a>
                    </nav>
                    <a href="#" class="footer-donate-btn">
                        Donate for volunteers
                        <img src="../../assets/icons/arrow-right.svg" alt="" class="btn-icon" width="24" height="22">
                    </a>
                </div>
                <div class="footer-divider"></div>
                <div class="footer-bottom">
                    <div class="footer-copyright">
                        <span class="copyright-text">&copy; 2021 DinaK</span>
                        <span class="copyright-text">&copy; Yem Digital</span>
                        <span class="copyright-text">&copy; RSSchool</span>
                    </div>
                    <div class="footer-social">
                        <a href="#" class="footer-social-link" aria-label="YouTube">
                            <img src="../../assets/icons/youtube.svg" alt="YouTube" width="40" height="40">
                        </a>
                        <a href="#" class="footer-social-link" aria-label="Instagram">
                            <img src="../../assets/icons/instagram.svg" alt="Instagram" width="40" height="40">
                        </a>
                        <a href="#" class="footer-social-link" aria-label="Facebook">
                            <img src="../../assets/icons/facebook.svg" alt="Facebook" width="40" height="40">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
