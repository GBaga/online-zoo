<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Zoo - Animal Map</title>
    <meta name="description" content="Find where animals live on the interactive map of Online Zoo.">

    <link rel="icon" type="image/x-icon" href="../../assets/icons/favicon.svg">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/header.css">
    <link rel="stylesheet" href="../../assets/css/footer.css">
    <link rel="stylesheet" href="../landing/style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../landing/index.html" class="logo">
                    <img src="../../assets/icons/logo.svg" alt="Online Zoo Logo" class="logo">
                </a>
                <nav class="nav-menu">
                    <a href="../landing/index.html#about" class="nav-link">About</a>
                    <a href="index.html" class="nav-link active">Map</a>
                    <a href="../zoos/index.html" class="nav-link">Zoos</a>
                    <a href="../contact/index.html" class="nav-link">Contact us</a>
                    <a href="https://www.figma.com/design/lnK11foY8Aoa6oOlDXovVN/Online-ZOO-Project" class="nav-link"
                        target="_blank" rel="noopener">Design</a>
                </nav>
                <div class="social-links">
                    <a href="#" class="social-link">
                        <img src="../../assets/icons/youtube-logo.svg" alt="YouTube" class="social-link">
                    </a>
                    <a href="#" class="social-link">
                        <img src="../../assets/icons/Instagram-logo.svg" alt="Instagram" class="social-link">
                    </a>
                    <a href="#" class="social-link">
                        <img src="../../assets/icons/facebook-logo.svg" alt="Facebook" class="social-link">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main map-page-main">

        <div class="container map-header-container">
            <h1 class="map-page-title">FIND WHERE ARE<br>THE ANIMALS LIVE</h1>
        </div>

        <section class="map-section">
            <div class="map-container">
                <!-- Interactive Map Wrapper -->
                <div class="map-interactive-area">

                    <!-- Background SVG/Image of the world map (Placeholder for now) -->
                    <img src="../../assets/images/map-blue.png" alt="World Map" class="map-bg">

                    <!-- Animal Pins -->
                    <!-- Eagle -->
                    <a href="../zoos/index.html#eagle" class="map-pin pin-eagle" aria-label="West End Bald Eagles">
                    </a>

                    <!-- Lion -->
                    <a href="../zoos/index.html#lion" class="map-pin pin-lion" aria-label="African Lion">
                    </a>

                    <!-- Gorilla -->
                    <a href="../zoos/index.html#gorilla" class="map-pin pin-gorilla" aria-label="Gorilla in Congo">
                    </a>

                    <!-- Lemur -->
                    <a href="../zoos/index.html#lemur" class="map-pin pin-lemur" aria-label="Madagascarian Lemur">
                    </a>

                    <!-- Tiger (Bonus from screenshot context) -->
                    <a href="../zoos/index.html#tiger" class="map-pin pin-tiger" aria-label="Sumatran Tiger">
                    </a>

                    <!-- Koala -->
                    <a href="../zoos/index.html#koala" class="map-pin pin-koala" aria-label="Australian Koala">
                    </a>

                    <!-- Panda -->
                    <a href="../zoos/index.html#panda" class="map-pin pin-panda" aria-label="Giant Panda">
                    </a>

                </div>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-top">
                    <div class="footer-logos">
                        <a href="../landing/index.html" class="logo">
                            <img src="../../assets/icons/white-logo-for-footer.svg" alt="Online Zoo Logo"
                                class="footer-logo">
                        </a>
                        <div class="footer-partner-logos">
                            <img src="../../assets/icons/yem-logo.svg" alt="Yem Digital" class="partner-logo">
                            <img src="../../assets/icons/rs-school-logo.svg" alt="RS School" class="rs-logo">
                        </div>
                    </div>
                    <nav class="footer-nav">
                        <a href="../landing/index.html#about" class="footer-nav-link">About</a>
                        <a href="index.html" class="footer-nav-link">Map</a>
                        <a href="../zoos/index.html" class="footer-nav-link">Zoos</a>
                        <a href="../contact/index.html" class="footer-nav-link">Contact us</a>
                    </nav>
                    <a href="#" class="footer-donate-btn">
                        donate for volunteers
                        <img src="../../assets/icons/right-arrow-white.svg" alt="" class="btn-icon">
                    </a>
                </div>

                <div class="footer-divider"></div>

                <div class="footer-bottom">
                    <div class="footer-copyright">
                        <span class="copyright-text">© 2021 DinaK</span>
                        <span class="copyright-text">© Yem Digital</span>
                        <span class="copyright-text">© RSSchool</span>
                    </div>
                    <div class="footer-social">
                        <a href="#" class="footer-social-link">
                            <img src="../../assets/icons/youtube-logo.svg" alt="YouTube">
                        </a>
                        <a href="#" class="footer-social-link">
                            <img src="../../assets/icons/Instagram-logo.svg" alt="Instagram">
                        </a>
                        <a href="#" class="footer-social-link">
                            <img src="../../assets/icons/facebook-logo.svg" alt="Facebook">
                        </a>
                    </div>
                </div>
            </div>
        </div>

    <script src="script.js"></script>
