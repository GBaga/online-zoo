<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Online Zoo</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="/assets/icons/favicon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/header.css" />
    <link rel="stylesheet" href="../login/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body data-page="register">
    <header class="header">
      <div class="container">
        <div class="header-content">
          <a href="../landing/index.html" class="logo">
            <img src="/assets/icons/logo.svg" alt="Online Zoo Logo" />
          </a>
          <nav class="nav-menu">
            <a href="../landing/index.html" class="nav-link">About</a>
            <a href="../map/index.html" class="nav-link">Map</a>
            <a href="../zoos/index.html" class="nav-link">Zoos</a>
            <a href="../contact/index.html" class="nav-link">Contact us</a>
          </nav>
          <div class="social-links">
            <a href="#" class="social-link"
              ><img src="/assets/icons/youtube-logo.svg" alt="YouTube"
            /></a>
            <a href="#" class="social-link"
              ><img src="/assets/icons/Instagram-logo.svg" alt="Instagram"
            /></a>
            <a href="#" class="social-link"
              ><img src="/assets/icons/facebook-logo.svg" alt="Facebook"
            /></a>
          </div>
        </div>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-container">
        <h2>Register</h2>
        <form id="registerForm" class="auth-form" novalidate>
          <div class="form-group">
            <label>Name*</label>
            <div class="input-wrapper">
              <input
                type="text"
                id="regNameInput"
                required
                placeholder="Enter name"
              />
            </div>
            <span class="error-msg" id="regNameError"></span>
          </div>
          <div class="form-group">
            <label>Email*</label>
            <div class="input-wrapper">
              <input
                type="email"
                id="regEmailInput"
                required
                placeholder="Enter email"
              />
            </div>
            <span class="error-msg" id="regEmailError"></span>
          </div>
          <div class="form-group">
            <label>Login*</label>
            <div class="input-wrapper">
              <input
                type="text"
                id="regLoginInput"
                required
                placeholder="Enter login"
              />
            </div>
            <span class="error-msg" id="regLoginError"></span>
          </div>
          <div class="form-group">
            <label>Password*</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="regPasswordInput"
                required
                placeholder="Enter password"
              />
            </div>
            <span class="error-msg" id="regPasswordError"></span>
          </div>
          <div class="form-group">
            <label>Confirm Password*</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="regConfirmPasswordInput"
                required
                placeholder="Confirm password"
              />
            </div>
            <span class="error-msg" id="regConfirmPasswordError"></span>
          </div>
          <button
            type="submit"
            id="registerSubmitBtn"
            class="btn-primary"
            disabled
          >
            Register
          </button>
          <div class="server-error" id="registerServerError"></div>
          <p class="auth-switch">
            Already registered? <a href="../login/index.html">Sign In</a>
          </p>
        </form>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div
          class="footer-bottom"
          style="
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            padding-top: 20px;
          "
        >
          <div class="footer-copyright">
            <span class="copyright-text">© Online Zoo</span>
          </div>
        </div>
      </div>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
